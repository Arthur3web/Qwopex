<!doctype html>

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f1115" />

               style-src 'self';

               font-src 'self';
               connect-src 'self';
               manifest-src 'self';
               worker-src 'self';
               frame-src https://oauth.telegram.org;
               object-src 'none';
               base-uri 'self';
               form-action 'self';
               frame-ancestors 'none'"

    <meta name="referrer" content="same-origin" />

    <main>
      <!-- LOGIN PAGE -->
      <section id="login-page" class="page login">
        <div class="login-container">
          <div class="login-logo">
            <svg class="icon"><use href="#i-logo" /></svg>
          </div>
          <h1 class="login-title">qwopex</h1>
          <p class="login-subtitle">Войдите через Telegram для продолжения</p>
          <div id="telegram-login"></div>
        </div>
      </section>

      <!-- HOME PAGE -->
      <section id="home-page" class="page home">
        <div class="top-bar">
          <div class="top-left">
            <span class="app-icon"
              ><svg class="icon"><use href="#i-logo" /></svg
            ></span>
            <span class="username">qwopex</span>
          </div>
          <div class="top-right">
            <button
              class="icon-btn theme-btn"
              data-action="toggle-theme"
              aria-label="Тема"
            >
              <svg class="icon theme-icon-dark"><use href="#i-sun" /></svg>
              <svg class="icon theme-icon-light"><use href="#i-moon" /></svg>
            </button>
            <button
              class="icon-btn logout-btn"
              data-action="logout"
              aria-label="Выйти"
            >
              <svg class="icon"><use href="#i-logout" /></svg>
            </button>
          </div>
        </div>

        <div class="content">
          <div>
            <div class="profile-card">
              <div class="avatar">
                <svg class="icon"><use href="#i-user" /></svg>
              </div>
              <div>
                <div class="user-id">#217651550 || @BVA21</div>
                <div class="date">Зарегистрирован: 25.10.2025, 21:03:52</div>
              </div>
            </div>

            <div class="info">
              <div class="balance">
                Баланс:
                <span class="green">1 200 ₽ (+600.75 ₽ бонусами)</span>
              </div>

              <div class="stats">
                <button
                  type="button"
                  class="stat"
                  data-action="open-posts"
                  data-arg="active"
                >
                  <div class="num" data-stat="active">0</div>
                  <div class="label">Активные</div>
                </button>
                <button
                  type="button"
                  class="stat"
                  data-action="open-posts"
                  data-arg="moderation"
                >
                  <div class="num" data-stat="moderation">0</div>
                  <div class="label">На модерации</div>
                </button>
              </div>
            </div>
          </div>

          <button
            class="create-btn"
            data-action="show-page"
            data-arg="create-page"
          >
            Создать объявление
          </button>
        </div>
      </section>

      <!-- POSTS PAGE -->
      <section id="posts-page" class="page posts-page">
        <div class="posts-header">
          <button
            class="icon-btn back-btn"
            data-action="show-page"
            data-arg="home-page"
            aria-label="Назад"
          >
            <svg class="icon"><use href="#i-arrow-left" /></svg>
          </button>
          <h2>Мои публикации</h2>
          <button
            class="icon-btn add-btn"
            data-action="show-page"
            data-arg="create-page"
            aria-label="Новое"
          >
            <svg class="icon"><use href="#i-plus" /></svg>
          </button>
        </div>

        <div class="search-container">
          <span class="search-icon"
            ><svg class="icon"><use href="#i-search" /></svg
          ></span>
          <input
            type="text"
            id="posts-search"
            placeholder="Поиск"
            maxlength="100"
            autocomplete="off"
            spellcheck="false"
          />
        </div>

        <div class="filters" id="filters">
          <button class="chip active" data-filter="all">
            Все <span class="chip-count" data-count="all">0</span>
          </button>
          <button class="chip" data-filter="active">
            Активные <span class="chip-count" data-count="active">0</span>
          </button>
          <button class="chip" data-filter="moderation">
            На модерации
            <span class="chip-count" data-count="moderation">0</span>
          </button>
          <button class="chip" data-filter="pinned">
            Закреплённые <span class="chip-count" data-count="pinned">0</span>
          </button>
        </div>

        <div class="posts-list" id="posts-list"></div>
      </section>

      <!-- CREATE PAGE -->
      <section id="create-page" class="page create-page">
        <div class="create-header">
          <button
            class="icon-btn back-btn"
            data-action="show-page"
            data-arg="home-page"
            aria-label="Назад"
          >
            <svg class="icon"><use href="#i-arrow-left" /></svg>
          </button>
          <h2>Создание</h2>
        </div>

        <div class="create-user">
          <div class="avatar small">
            <svg class="icon"><use href="#i-user" /></svg>
          </div>
          <div class="create-user-info">
            <div class="user-id">#217651550 || @BVA21</div>
          </div>
        </div>

        <div class="upload-box">
          <input type="file" id="media" hidden accept="image/*" />
          <label for="media" class="upload-area">
            <div class="upload-icon">
              <svg class="icon"><use href="#i-image" /></svg>
            </div>
            <p>Загрузить медиа</p>
          </label>
        </div>

        <div class="form">
          <input
            type="text"
            placeholder="Название"
            id="title"
            maxlength="100"
            autocomplete="off"
          />

          <!-- Rich text editor -->
          <div class="editor">
            <div
              class="editor-toolbar"
              role="toolbar"
              aria-label="Форматирование"
            >
              <button
                type="button"
                class="tool"
                data-cmd="bold"
                title="Жирный (Ctrl+B)"
                aria-label="Жирный"
              >
                <svg class="icon"><use href="#i-bold" /></svg>
              </button>
              <button
                type="button"
                class="tool"
                data-cmd="italic"
                title="Курсив (Ctrl+I)"
                aria-label="Курсив"
              >
                <svg class="icon"><use href="#i-italic" /></svg>
              </button>
              <button
                type="button"
                class="tool"
                data-cmd="underline"
                title="Подчеркнутый (Ctrl+U)"
                aria-label="Подчеркнутый"
              >
                <svg class="icon"><use href="#i-underline" /></svg>
              </button>
              <button
                type="button"
                class="tool"
                data-cmd="strikeThrough"
                title="Зачеркнутый"
                aria-label="Зачеркнутый"
              >
                <svg class="icon"><use href="#i-strike" /></svg>
              </button>
              <span class="tool-sep"></span>
              <button
                type="button"
                class="tool"
                data-cmd="insertUnorderedList"
                title="Маркированный список"
                aria-label="Список"
              >
                <svg class="icon"><use href="#i-list" /></svg>
              </button>
              <button
                type="button"
                class="tool"
                data-cmd="insertOrderedList"
                title="Нумерованный список"
                aria-label="Нумерованный список"
              >
                <svg class="icon"><use href="#i-list-ol" /></svg>
              </button>
              <span class="tool-sep"></span>
              <button
                type="button"
                class="tool"
                data-cmd="removeFormat"
                title="Очистить форматирование"
                aria-label="Очистить формат"
              >
                <svg class="icon"><use href="#i-eraser" /></svg>
              </button>
            </div>
            <div
              id="description"
              class="editor-area"
              contenteditable="true"
              data-placeholder="Описание"
              data-maxlength="2000"
            ></div>
          </div>

          <div class="price-input">
            <span>₽</span>
            <input
              type="number"
              placeholder="Цена"
              id="price"
              min="0"
              max="999999999"
              step="1"
              inputmode="numeric"
            />
          </div>
        </div>

        <button class="done-btn" data-action="create-post">
          <svg class="icon"><use href="#i-check" /></svg>
          Готово
        </button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
