<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f1115" />
    <!-- ========== БЕЗОПАСНОСТЬ ========== -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self';
               script-src 'self' https://telegram.org;
               style-src 'self';
               img-src 'self' data: https://t.me;
               font-src 'self';
               connect-src 'self';
               manifest-src 'self';
               worker-src 'self';
               frame-src https://oauth.telegram.org;
               object-src 'none';
               base-uri 'self';
               form-action 'self';
               frame-ancestors 'none'"
    />
    <meta name="referrer" content="same-origin" />
    <title>qwop ex</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- ========== SVG SPRITE ========== -->
    <!-- SVG-спрайт иконок инъектируется из icons.svg в app.js (loadIcons) -->

    <main id="shell">
      <!-- Шапка шелла: видна только на лаунчере, мини-аппы рисуют свою -->
      <header class="top-bar" id="shell-top">
        <div class="top-left">
          <span class="app-icon"><svg class="icon"><use href="#i-logo" /></svg></span>
          <span class="username">qwopex</span>
        </div>
        <div class="top-right">
          <button class="icon-btn theme-btn" data-action="toggle-theme" aria-label="Тема">
            <svg class="icon theme-icon-dark"><use href="#i-sun" /></svg>
            <svg class="icon theme-icon-light"><use href="#i-moon" /></svg>
          </button>
          <button class="icon-btn logout-btn" data-action="logout" aria-label="Выйти">
            <svg class="icon"><use href="#i-logout" /></svg>
          </button>
        </div>
      </header>

      <!-- Точка монтирования: сюда шелл рисует лаунчер или мини-апп -->
      <div id="view"></div>
    </main>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
